<header class="header">
  <div class="header__logo">
    <ng-content select="[logo]"></ng-content>
  </div>
  <div class="header__content">
    <ng-content select="[content]"></ng-content>
  </div>
  <div class="header__profile">
    <app-avatar
      size="sm"
      name="Vikas Phulriya"
      [onClick]="handleProfileClick"
      title="This is avatar"
    />
  </div>
</header>
